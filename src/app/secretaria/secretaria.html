<div class="min-h-screen bg-green-50 p-6">
<button 
  class="fixed top-4 left-4 bg-green-700 text-white w-10 h-10 rounded-full shadow flex items-center justify-center hover:bg-green-800 transition"
  (click)="voltar()">

  ←

</button>
  <h1 class="text-3xl font-bold text-green-700 mb-6 text-center">
    Secretaria Acadêmica
  </h1>

  <!-- Botões -->
  <div class="flex justify-center gap-4 mb-8">
    <button 
      (click)="setOpcao('atendimento')" 
      [ngClass]="getClasse('atendimento')">
      Atendimento
    </button>

    <button 
      (click)="setOpcao('documentos')" 
      [ngClass]="getClasse('documentos')">
      Documentos
    </button>

    <button 
      (click)="setOpcao('requerimentos')" 
      [ngClass]="getClasse('requerimentos')">
      Requerimentos
    </button>
  </div>

  <!-- Lista -->
  <div class="grid md:grid-cols-3 gap-4">
    <div 
      *ngFor="let item of lista" 
      class="bg-white p-4 rounded-xl shadow hover:scale-105 transition">

      <h3 class="text-lg font-semibold text-green-700">
        {{ item }}
      </h3>

      <p class="text-gray-600 text-sm mt-2">
        Clique para mais informações
      </p>
      
    </div>
  </div>

</div>
