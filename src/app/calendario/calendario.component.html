<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

  <div class="flex items-center justify-between px-6 py-4 border-b border-gray-50">
    <button
      class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 bg-white hover:bg-[#e8f0dc] transition-colors text-gray-500"
      (click)="navegarMes(-1)">&#8592;</button>
    <div class="text-center">
      <h2 class="text-xl text-gray-900" style="font-family: 'DM Serif Display', serif">{{ mesTitulo }}</h2>
      <p class="text-xs text-gray-400 font-medium">{{ semestreLabel }}</p>
    </div>
    <button
      class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 bg-white hover:bg-[#e8f0dc] transition-colors text-gray-500"
      (click)="navegarMes(1)">&#8594;</button>
  </div>

  <div class="grid grid-cols-7 px-4 pt-4 pb-1 gap-1">
    <div *ngFor="let d of diasDaSemana"
      class="text-center text-xs font-semibold text-gray-400 pb-2">{{ d }}</div>
  </div>

  <div class="grid grid-cols-7 gap-1 px-4 pb-5">
    <div
      *ngFor="let celula of celulas"
      class="aspect-square flex flex-col items-center justify-center rounded-[10px] cursor-pointer transition-transform relative text-[13px] font-medium min-w-0 hover:scale-105"
      [class]="getClasseCelula(celula)"
      [class.today-ring]="celula.ehHoje && diaSelecionadoChave !== celula.chave"
      (click)="clicarDia(celula)">
      <ng-container *ngIf="!celula.vazia">
        <span class="text-sm font-semibold leading-none">{{ celula.dia }}</span>
        <div *ngIf="celula.eventos.length > 1" class="flex gap-0.5 absolute bottom-1">
          <div
            *ngFor="let ev of celula.eventos.slice(0, 3)"
            class="w-1 h-1 rounded-full"
            [class]="getClassePonto(ev.tipo, diaSelecionadoChave === celula.chave)">
          </div>
        </div>
      </ng-container>
    </div>
  </div>

  <div class="flex flex-wrap gap-3 px-6 pb-4 pt-2 border-t border-gray-50">
    <div class="flex items-center gap-1.5">
      <div class="w-2.5 h-2.5 rounded-[3px] bg-blue-100 border border-blue-200"></div>
      <span class="text-xs text-gray-500">Aula</span>
    </div>
    <div class="flex items-center gap-1.5">
      <div class="w-2.5 h-2.5 rounded-[3px] bg-amber-100 border border-amber-200"></div>
      <span class="text-xs text-gray-500">Prova</span>
    </div>
    <div class="flex items-center gap-1.5">
      <div class="w-2.5 h-2.5 rounded-[3px] bg-pink-100 border border-pink-200"></div>
      <span class="text-xs text-gray-500">Feriado</span>
    </div>
    <div class="flex items-center gap-1.5">
      <div class="w-2.5 h-2.5 rounded-[3px] bg-emerald-100 border border-emerald-200"></div>
      <span class="text-xs text-gray-500">Evento</span>
    </div>
    <div class="flex items-center gap-1.5">
      <div class="w-2.5 h-2.5 rounded-[3px] border-2 border-[#2d5016]"></div>
      <span class="text-xs text-gray-500">Hoje</span>
    </div>
  </div>

</div>
